# train detector config
# Edit any value and save — detector reloads within one block.
# Lines starting with # are comments and are ignored.

DEVICE              = 1
SAMPLE_RATE         = 44100
BLOCK_DURATION      = 1.0

# ── Rolling buffer ────────────────────────────────────────────────────────────
BUFFER_SECONDS      = 30       # keep a full minute rolling for clip extraction
CLIP_SECONDS        = 3.0        # window fed to classifier each time (shorter = more responsive)

# ── Classifier ────────────────────────────────────────────────────────────────
CLASSIFIER_THRESHOLD = 0.400    # score above this = a hit (lowered slightly)
CLASSIFIER_THRESHOLD_FARAWAY = 0.200
CLASSIFIER_THRESHOLD_INTERFERENCE = 0.100
CLASSIFY_EVERY      = 3.0     # seconds between classifier runs (more frequent)


# ── Pre-filter ────────────────────────────────────────────────────────────────
# Skip classifier if the loudest block in the window is below this RMS.
MIN_RMS             = 0.005

# ── Saving ────────────────────────────────────────────────────────────────────
# How many seconds of audio to save around the detection.
# Taken from the rolling buffer centered on the first hit.
SAVE_SECONDS        = 5 
COOLDOWN            = 0       # min seconds between saves
USE_FILE_STORAGE    = False

DEBUG               = False